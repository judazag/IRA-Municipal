services:
  db:
    image: postgis/postgis:16-3.4
    container_name: ira-db
    environment:
      POSTGRES_DB: ira_municipal
      POSTGRES_USER: ira_user
      POSTGRES_PASSWORD: ira_pass
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    image: ira-municipal-backend
    container_name: ira-backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
      POSTGRES_DB: ira_municipal
      POSTGRES_USER: ira_user
      POSTGRES_PASSWORD: ira_pass
      PYTHONPATH: /app
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend:ro
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
      - ./data:/app/data:ro
    restart: unless-stopped

volumes:
  postgres_data:
