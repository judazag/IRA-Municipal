version: '3.8'

services:

  # ─── Base de datos ───────────────────────────────────────────────────────────
  db:
    image: postgis/postgis:15-3.3
    container_name: ira_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: 
      POSTGRES_USER: 
      POSTGRES_PASSWORD: 
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U  -d "]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Backend FastAPI ──────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ira_backend
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: 
      POSTGRES_USER: 
      POSTGRES_PASSWORD: 
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── Pipeline Python ──────────────────────────────────────────────────────────
  pipeline:
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    container_name: ira_pipeline
    restart: unless-stopped
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: 
      POSTGRES_USER: 
      POSTGRES_PASSWORD: 
      SODA_BASE_URL: 
      SODA_TIMEOUT: 
      SODA_PAGE_SIZE: 
      NOAA_ONI_URL: 
      IDEAM_DHIME_URL: 
    volumes:
      - ./pipeline:/app
      - ./data:/data
    depends_on:
      db:
        condition: service_healthy

  # ─── Airflow ──────────────────────────────────────────────────────────────────
  airflow:
    image: apache/airflow:2.8.1
    container_name: ira_airflow
    restart: unless-stopped
    environment:
      AIRFLOW__CORE__EXECUTOR: LocalExecutor
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://:@db:5432/airflow
      AIRFLOW__CORE__FERNET_KEY: ''
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: 'true'
      AIRFLOW__CORE__LOAD_EXAMPLES: 'false'
      AIRFLOW_UID: 
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      POSTGRES_DB: 
      POSTGRES_USER: 
      POSTGRES_PASSWORD: 
      SODA_BASE_URL: 
      SODA_PAGE_SIZE: 
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./pipeline:/opt/airflow/pipeline
      - ./data:/data
      - airflow_logs:/opt/airflow/logs
    depends_on:
      db:
        condition: service_healthy
    command: >
      bash -c "airflow db init &&
               airflow users create --username admin --password admin --firstname Admin --lastname Admin --role Admin --email admin@ira.co &&
               airflow webserver & airflow scheduler"

volumes:
  postgres_data:
  airflow_logs:
